name: Refresh Jobber Cookies

on:
  schedule:
    # Run every hour to keep cookies fresh (they expire after ~4 hours)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    name: Refresh Jobber Session Cookies
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx puppeteer browsers install chrome

      - name: Refresh cookies (attempt 1)
        id: attempt1
        continue-on-error: true
        run: node scripts/sync-cookies.mjs --target remote
        working-directory: worker
        env:
          JOBBER_WEB_EMAIL: ${{ secrets.JOBBER_WEB_EMAIL }}
          JOBBER_WEB_PASSWORD: ${{ secrets.JOBBER_WEB_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Wait before retry
        if: steps.attempt1.outcome == 'failure'
        run: sleep 15

      - name: Refresh cookies (attempt 2)
        if: steps.attempt1.outcome == 'failure'
        id: attempt2
        continue-on-error: true
        run: node scripts/sync-cookies.mjs --target remote
        working-directory: worker
        env:
          JOBBER_WEB_EMAIL: ${{ secrets.JOBBER_WEB_EMAIL }}
          JOBBER_WEB_PASSWORD: ${{ secrets.JOBBER_WEB_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Wait before final retry
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        run: sleep 30

      - name: Refresh cookies (attempt 3 - final)
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        run: node scripts/sync-cookies.mjs --target remote
        working-directory: worker
        env:
          JOBBER_WEB_EMAIL: ${{ secrets.JOBBER_WEB_EMAIL }}
          JOBBER_WEB_PASSWORD: ${{ secrets.JOBBER_WEB_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
