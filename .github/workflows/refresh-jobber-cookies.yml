name: Refresh Jobber Cookies

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    name: Refresh Jobber Session Cookies
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx puppeteer browsers install chrome

      - name: Refresh cookies
        run: node scripts/sync-cookies.mjs --target remote
        working-directory: worker
        env:
          JOBBER_WEB_EMAIL: ${{ secrets.JOBBER_WEB_EMAIL }}
          JOBBER_WEB_PASSWORD: ${{ secrets.JOBBER_WEB_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
