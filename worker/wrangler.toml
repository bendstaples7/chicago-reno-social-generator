name = "social-media-cross-poster"
main = "src/index.ts"
compatibility_date = "2024-12-01"
account_id = "bb32e3131a6d41a35dc00b65e86287fd"

[[d1_databases]]
binding = "DB"
database_name = "cross-poster-db"
database_id = "300f9629-60b2-4e2d-a574-e77bf50235ff"
migrations_dir = "src/migrations"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "chicago-reno-media"
preview_bucket_name = "chicago-reno-media-preview"

[[queues.producers]]
binding = "IMAGE_QUEUE"
queue = "image-generation-queue"

[[queues.consumers]]
queue = "image-generation-queue"
max_batch_size = 1
max_retries = 2

[vars]
AI_TEXT_API_URL = "https://api.openai.com/v1/chat/completions"
S3_PUBLIC_URL = "https://pub-afd5afa0999c424cac970f4b4e671bd6.r2.dev"
FRONTEND_URL = "https://chicago-reno-social-generator.pages.dev"

# Secrets (set via `wrangler secret put <NAME>`):
# All secrets below are REQUIRED for the deployed worker to function correctly.
# Missing secrets cause silent failures (e.g. token refresh fails with empty credentials).
#
# AI_TEXT_API_KEY           — OpenAI API key for text generation and embeddings
# CHANNEL_ENCRYPTION_KEY   — AES key for encrypting stored Instagram tokens
# FB_PAGE_ACCESS_TOKEN     — Facebook Page access token for Instagram publishing
# IG_BUSINESS_ACCOUNT_ID   — Instagram Business account ID
# INSTAGRAM_CLIENT_ID      — Instagram OAuth app client ID
# INSTAGRAM_CLIENT_SECRET  — Instagram OAuth app client secret
# JOBBER_CLIENT_ID         — Jobber OAuth app client ID (required for token refresh)
# JOBBER_CLIENT_SECRET     — Jobber OAuth app client secret (required for token refresh)
# JOBBER_ACCESS_TOKEN      — Jobber API access token (initial; refreshed automatically)
# JOBBER_REFRESH_TOKEN     — Jobber API refresh token (initial; rotated automatically)
# JOBBER_WEB_EMAIL         — Jobber login email (used by cookie refresh workflow)
# JOBBER_WEB_PASSWORD      — Jobber login password (used by cookie refresh workflow)
# CLOUDFLARE_ACCOUNT_ID    — Cloudflare account ID (used by Browser Rendering REST API for cookie refresh)
# CLOUDFLARE_API_TOKEN     — Cloudflare API token with Browser Rendering permissions (used for cookie refresh)
# GITHUB_PAT               — GitHub personal access token with 'workflow' scope (triggers cookie refresh workflow from the app)
