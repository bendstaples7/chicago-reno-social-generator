name: E2E Smoke Tests

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create worker dev vars
        run: |
          cat > worker/.dev.vars << 'EOF'
          AI_TEXT_API_KEY=test-placeholder
          CHANNEL_ENCRYPTION_KEY=test-placeholder
          FB_PAGE_ACCESS_TOKEN=test-placeholder
          IG_BUSINESS_ACCOUNT_ID=test-placeholder
          INSTAGRAM_CLIENT_ID=test-placeholder
          INSTAGRAM_CLIENT_SECRET=test-placeholder
          JOBBER_CLIENT_ID=test-placeholder
          JOBBER_CLIENT_SECRET=test-placeholder
          JOBBER_ACCESS_TOKEN=test-placeholder
          JOBBER_REFRESH_TOKEN=test-placeholder
          EOF

      - name: Start dev servers
        run: |
          # Start the Vite client dev server
          npm run dev:client &

          # Start the worker directly with wrangler (skip sync scripts)
          cd worker && npx wrangler dev &
          cd ..

          # Wait for both servers to be ready
          echo "Waiting for client on :5173..."
          npx wait-on --timeout 60000 http-get://127.0.0.1:5173

          echo "Waiting for worker on :8787..."
          npx wait-on --timeout 60000 http-get://127.0.0.1:8787/health

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
