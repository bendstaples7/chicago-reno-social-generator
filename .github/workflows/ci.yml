name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate migration patterns
        run: bash worker/scripts/validate-migrations.sh

      - name: Validate D1 migrations apply cleanly
        working-directory: worker
        run: |
          echo "Applying all migrations to a fresh local D1 database..."
          npx wrangler d1 migrations apply DB --local
          echo "✅ All migrations applied successfully"

      - name: Typecheck worker
        run: npx tsc -p worker/tsconfig.json --noEmit
        continue-on-error: true

      - name: Typecheck client
        run: npx tsc -p client/tsconfig.json --noEmit
