name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker + Client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # ── Worker deploy ──────────────────────────────────────────
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply DB --remote
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy worker to Cloudflare
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Apply catalog ordering to production
        run: node scripts/apply-catalog-order.mjs --remote
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify worker deployment
        run: |
          URL="https://social-media-cross-poster.chicago-reno.workers.dev/health"
          for i in 1 2 3 4 5; do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying..."
          done
          echo "::error::Health check failed after 5 attempts"
          exit 1

      # ── Client deploy (only after worker succeeds) ─────────────
      # This ensures the client never ships UI for features the
      # worker can't serve. Disable Cloudflare Pages auto-deploy
      # (git integration) so this workflow is the sole deploy path.
      - name: Build client
        run: npm run build:client

      - name: Deploy client to Cloudflare Pages
        run: npx wrangler pages deploy client/dist --project-name=cotiza-e4h --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
